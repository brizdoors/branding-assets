<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Briz Doors Branding Assets</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --surface: #ffffff;
      --text: #1f2933;
      --muted: #5b6b7a;
      --line: #d9e2ec;
      --accent: #0f4c81;
      --accent-2: #0a65a3;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", "Helvetica Neue", Helvetica, sans-serif;
      color: var(--text);
      background: linear-gradient(165deg, #f8fafc 0%, #edf2f7 50%, #f4f6f8 100%);
      min-height: 100vh;
    }

    .wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 32px 16px 48px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 2vw + 1rem, 2.4rem);
      letter-spacing: 0.02em;
    }

    p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .meta {
      margin-top: 16px;
      padding: 10px 12px;
      background: #eef5fb;
      border: 1px solid #c6dbef;
      border-radius: 10px;
      font-size: 0.95rem;
    }

    .top-actions {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .grid {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
    }

    .preview {
      height: 140px;
      display: grid;
      place-items: center;
      background-image: linear-gradient(45deg, #eef2f6 25%, transparent 25%), linear-gradient(-45deg, #eef2f6 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #eef2f6 75%), linear-gradient(-45deg, transparent 75%, #eef2f6 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0;
      padding: 14px;
    }

    .preview img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .body {
      padding: 10px 12px 12px;
    }

    .name {
      font-size: 0.9rem;
      font-weight: 600;
      margin: 0;
      word-break: break-all;
    }

    .path {
      margin: 6px 0 10px;
      color: var(--muted);
      font-size: 0.78rem;
      word-break: break-all;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.8rem;
      color: var(--text);
      text-decoration: none;
      background: #fff;
      cursor: pointer;
    }

    .btn.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .btn.primary:hover { background: var(--accent-2); }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Briz Doors Branding Assets</h1>
    <p>SVG logos and icons with transparent backgrounds, optimized for web use.</p>
    <div class="meta" id="meta">Loading assets...</div>
    <div class="top-actions">
      <a class="btn primary" href="./usage.html">SVG Usage Guide</a>
    </div>
    <section class="grid" id="grid" aria-live="polite"></section>
  </main>

  <script>
    async function loadAssets() {
      const grid = document.getElementById("grid");
      const meta = document.getElementById("meta");

      try {
        const response = await fetch("./assets.json", { cache: "no-store" });
        const assets = await response.json();
        meta.textContent = `Published ${assets.length} SVG assets under /docs/branding.`;

        for (const path of assets) {
          const name = path.split("/").pop();
          const card = document.createElement("article");
          card.className = "card";

          const fullUrl = new URL(path, window.location.href).href;

          card.innerHTML = `
            <div class="preview"><img src="${path}" alt="${name}"></div>
            <div class="body">
              <p class="name">${name}</p>
              <p class="path">${path}</p>
              <div class="actions">
                <a class="btn primary" href="${path}" target="_blank" rel="noopener">Open</a>
                <a class="btn" href="${path}" download>Download</a>
                <button class="btn" data-url="${fullUrl}">Copy URL</button>
              </div>
            </div>
          `;

          card.querySelector("button").addEventListener("click", async (event) => {
            const button = event.currentTarget;
            await navigator.clipboard.writeText(button.dataset.url);
            const old = button.textContent;
            button.textContent = "Copied";
            setTimeout(() => {
              button.textContent = old;
            }, 900);
          });

          grid.appendChild(card);
        }
      } catch (error) {
        meta.textContent = "Failed to load assets.json.";
      }
    }

    loadAssets();
  </script>
</body>
</html>
